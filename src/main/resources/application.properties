spring.application.name=backend
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSX
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.url=jdbc:mysql://localhost:3306/trohub_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
# Allow executing migrations that have a lower version than the current schema
# (useful here because V7/V8 were already applied before V6 was fixed)
spring.flyway.out-of-order=true
jwt.secret=change-me-to-a-secure-random-string
jwt.expiration-ms=3600000

# Use port provided by hosting platforms (e.g. Render sets $PORT). Fall back to 8081 for local runs.
server.port=${PORT:8081}


# Upload configuration for attachments
# max size in bytes (default 5 MB)
upload.max-size=5242880
# comma-separated allowed content types
upload.allowed-types=image/png,image/jpeg,image/jpg,image/gif,application/pdf
# base directory for uploads (relative to working dir)
upload.base-dir=uploads
# subdirectory for incident attachments
upload.incidents-dir=incidents

